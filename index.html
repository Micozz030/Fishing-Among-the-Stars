<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>木筏漂流记</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header id="topbar">
    <div id="topbar-row1">
      <span class="stat" id="stat-era">🪵 石器时代</span>
      <span class="stat" id="stat-zone">📍 溪流</span>
      <span class="stat" id="topbar-raftstats">⚡速0 🛡牢0 🎨美0</span>
      <span class="stat" id="topbar-gold">🪙 0</span>
    </div>
    <div id="topbar-row2">
      <span id="energy-icon-label">⚡精力</span>
      <div id="energy-bar"><div id="energy-bar-fill"></div></div>
      <span id="energy-value">80/100</span>
    </div>
  </header>
  <div id="topbar-spacer"></div>

  <div id="canvas-wrap">
    <canvas id="game" width="360" height="420"></canvas>
    <button id="btn-costume" class="canvas-fab hidden" title="奇幻镜">🪞</button>
  </div>

  <button id="btn-reset-save" title="重置存档">重置存档</button>

  <div id="reset-confirm-modal" class="hidden">
    <div class="chest-box reset-confirm-box">
      <p id="reset-confirm-msg">确定要清空所有进度吗？此操作不可撤销</p>
      <div class="reset-confirm-btns">
        <button id="btn-reset-confirm" class="big-btn reset-danger-btn">确认</button>
        <button id="btn-reset-cancel" class="big-btn secondary">取消</button>
      </div>
    </div>
  </div>

  <div id="toast-layer"></div>
  <div id="achievement-toast-layer"></div>
  <div id="legendary-flash"></div>

  <div id="panel">
    <!-- 资源速览条: 8个高频资源的紧凑图标+数字, 点击任意处打开背包查看完整库存 -->
    <div id="resource-strip-wrap">
      <div id="resource-strip">
        <div class="res-chip" id="res-wood">🪵<span>0</span></div>
        <div class="res-chip" id="res-rope">🧵<span>0</span></div>
        <div class="res-chip" id="res-scrap">🔧<span>0</span></div>
        <div class="res-chip" id="res-iron">🔩<span>0</span></div>
        <div class="res-chip" id="res-fish">🐟<span>0</span></div>
        <div class="res-chip" id="res-seaweed">🌿<span>0</span></div>
        <div class="res-chip" id="res-bread">🍞<span>0</span></div>
        <div class="res-chip" id="res-spam">🥫<span>0</span></div>
      </div>
    </div>

    <!-- 主操作区(拇指热区): 钓鱼(最突出, 含饵料下拉+动画进度条) + 拉钩打捞 + 翻垃圾 -->
    <div id="primary-actions">
      <div class="action-row" id="row-fish">
        <div class="dropdown-root" id="bait-root">
          <div class="bait-main-row">
            <button id="btn-fish-cast" class="fish-cast-btn">🎣 钓鱼</button>
            <button id="btn-bait-arrow" class="bait-arrow-btn">▾</button>
          </div>
          <div id="fish-progress" class="fish-progress hidden"><div id="fish-progress-fill" class="fish-progress-fill"></div></div>
          <div id="bait-dropdown" class="dropdown-panel hidden"></div>
        </div>
      </div>
      <div class="action-row two-col">
        <button id="btn-fish-loot" class="big-btn">🪝 拉钩打捞</button>
        <button id="btn-rummage" class="big-btn secondary">🗑️ 翻垃圾</button>
      </div>
    </div>

    <!-- 次级操作区: 建造 + 打造 -->
    <div class="action-row two-col">
      <button id="btn-build" class="big-btn secondary">🔨 建造</button>
      <button id="btn-craft" class="big-btn secondary">⚒️ 打造</button>
    </div>

    <!-- 图标导航栏 (低频功能入口, 长按/悬停查看名称) -->
    <div id="zone-row">
      <button id="btn-guide" class="icon-nav-btn" title="任务指引">📋</button>
      <button id="btn-bag" class="icon-nav-btn" title="背包">🎒</button>
      <button id="btn-bestiary" class="icon-nav-btn" title="钓鱼图鉴">📖</button>
      <button id="btn-blueprints" class="icon-nav-btn" title="图纸收藏">📐</button>
      <button id="btn-skilltree" class="icon-nav-btn" title="技能树">🌳</button>
      <button id="btn-achievements" class="icon-nav-btn" title="成就">🏆</button>
      <button id="btn-shop" class="icon-nav-btn" title="商店">🏪</button>
      <button id="btn-zone-switch" class="icon-nav-btn" title="前往河流">⛵</button>
    </div>
  </div>

  <div id="build-modal" class="hidden">
    <div class="chest-box build-box">
      <button class="close-btn" id="build-close">✕</button>
      <h2>🔨 建造</h2>
      <div id="build-grid-list" class="workshop-grid"></div>
    </div>
  </div>

  <div id="craft-modal" class="hidden">
    <div class="chest-box craft-box">
      <button class="close-btn" id="craft-close">✕</button>
      <h2>⚒️ 打造</h2>
      <div id="craft-list"></div>
    </div>
  </div>

  <div id="guide-modal">
    <div class="chest-box guide-box">
      <button class="close-btn" id="guide-close">✕</button>
      <h2>📋 任务指引</h2>
      <div id="guide-content"></div>
    </div>
  </div>

  <div id="bag-modal" class="hidden">
    <div class="chest-box bag-box">
      <button class="close-btn" id="bag-close">✕</button>
      <h2>🎒 背包</h2>
      <div id="bag-grid"></div>
    </div>
  </div>

  <div id="bottle-modal" class="hidden">
    <div class="chest-box bottle-box">
      <button class="close-btn" id="bottle-close">✕</button>
      <h2 id="bottle-title">🍾「漂流瓶」</h2>
      <div id="bottle-quote" class="bottle-quote"></div>
      <div id="bottle-instruction" class="bottle-instruction"></div>
      <div id="bottle-reward" class="bottle-reward"></div>
      <button id="bottle-claim" class="big-btn">领取奖励</button>
    </div>
  </div>

  <div id="chest-modal" class="hidden">
    <div class="chest-box">
      <h2>🎁 打捞到一个箱子!</h2>
      <div id="chest-result"></div>
      <button id="chest-close" class="big-btn">收下</button>
    </div>
  </div>

  <div id="event-modal" class="hidden">
    <div class="chest-box event-box">
      <button class="close-btn" id="event-close">✕</button>
      <h2 id="event-title">事件</h2>
      <div id="event-desc"></div>
      <div id="event-options"></div>
    </div>
  </div>

  <div id="buff-modal" class="hidden">
    <div class="chest-box buff-box">
      <h2>⛵ 进入河流 - 选择一个祝福</h2>
      <div id="buff-options"></div>
    </div>
  </div>

  <div id="bestiary-modal" class="hidden">
    <div class="chest-box bestiary-box">
      <button class="close-btn" id="bestiary-close">✕</button>
      <h2>📖 钓鱼图鉴</h2>
      <div id="bestiary-grid"></div>
    </div>
  </div>

  <div id="blueprint-modal" class="hidden">
    <div class="chest-box bestiary-box">
      <button class="close-btn" id="blueprint-close">✕</button>
      <h2>📐 图纸收藏</h2>
      <div id="blueprint-grid"></div>
    </div>
  </div>

  <div id="skilltree-modal" class="hidden">
    <div class="chest-box skilltree-box">
      <button class="close-btn" id="skilltree-close">✕</button>
      <h2>🌳 技能树</h2>
      <div id="skill-points-row">
        <span id="skill-points-build">🪵 建造点: 0</span>
        <span id="skill-points-fish">🎣 钓鱼点: 0</span>
      </div>
      <div id="skill-trees">
        <div class="skill-tree-col" id="skill-tree-build"></div>
        <div class="skill-tree-divider"></div>
        <div class="skill-tree-col" id="skill-tree-fish"></div>
      </div>
      <div id="skill-detail">点击一个节点查看详情</div>
    </div>
  </div>

  <div id="achievement-modal" class="hidden">
    <div class="chest-box bestiary-box">
      <button class="close-btn" id="achievement-close">✕</button>
      <h2>🏆 成就</h2>
      <div id="achievement-list"></div>
    </div>
  </div>

  <div id="costume-modal" class="hidden">
    <div class="chest-box costume-box">
      <button class="close-btn" id="costume-close">✕</button>
      <h2>🪞 奇幻镜·千变万化</h2>
      <div class="costume-row">
        <span class="costume-row-label">发色</span>
        <div id="costume-hair-options" class="costume-opts"></div>
      </div>
      <div class="costume-row">
        <span class="costume-row-label">瞳色</span>
        <div id="costume-eye-options" class="costume-opts"></div>
      </div>
      <div class="costume-row">
        <span class="costume-row-label">衣服</span>
        <div id="costume-outfit-options" class="costume-opts"></div>
      </div>
      <div class="costume-row">
        <span class="costume-row-label">配件</span>
        <div id="costume-accessory-options" class="costume-opts"></div>
      </div>
    </div>
  </div>

  <div id="shop-modal" class="hidden">
    <div class="chest-box shop-box">
      <button class="close-btn" id="shop-close">✕</button>
      <h2>🏪 商店</h2>
      <div id="shop-tabs">
        <button id="shop-tab-sell" class="shop-tab-btn active">出售</button>
        <button id="shop-tab-buy" class="shop-tab-btn">购买</button>
      </div>
      <div id="shop-content"></div>
    </div>
  </div>

</div>
<script src="game.js"></script>
</body>
</html>
